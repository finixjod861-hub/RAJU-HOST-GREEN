<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Admin Access | RAJU HOST — GREEN ELITE</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

    :root {
      --admin-accent: #00e676;      /* Premium Green Core */
      --admin-glow: rgba(0, 230, 118, 0.45);
      --bg: #0a100a;                /* Deep forest black-green */
      --glass: rgba(255, 255, 255, 0.02);
      --border: rgba(0, 230, 118, 0.25);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

    body {
      background-color: var(--bg);
      background-image: 
        radial-gradient(circle at 15% 15%, rgba(0, 230, 118, 0.2) 0%, transparent 40%),
        radial-gradient(circle at 85% 85%, rgba(0, 200, 100, 0.15) 0%, transparent 40%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    /* Hardware Accelerated Glass Card — Green Radiance */
    .admin-box {
      background: var(--glass);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      padding: 50px 40px;
      border-radius: 32px;
      width: 100%;
      max-width: 400px;
      border: 1px solid var(--border);
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.6), 0 0 15px rgba(0,230,118,0.1);
      position: relative;
      will-change: transform;
    }

    /* Top Progress Loader — Green Spark */
    .loader {
      position: absolute; top: 0; left: 0; width: 100%; height: 4px;
      background: rgba(0, 230, 118, 0.1); display: none; overflow: hidden;
      border-radius: 32px 32px 0 0;
    }
    .fill { height: 100%; background: var(--admin-accent); width: 0%; box-shadow: 0 0 15px #00e676; transition: width 0.4s; }

    .brand-icon {
      width: 70px; height: 70px;
      background: rgba(0, 230, 118, 0.12);
      border-radius: 20px;
      border: 1px solid rgba(0, 230, 118, 0.3);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 25px; font-size: 32px; color: var(--admin-accent);
      text-shadow: 0 0 15px var(--admin-glow);
    }

    h2 { color: #fff; font-size: 26px; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; }
    p.desc { color: #9ba3af; font-size: 14px; margin-bottom: 35px; }

    .input-wrapper { position: relative; margin-bottom: 20px; }
    
    .input-wrapper i {
      position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
      color: #577a5e; font-size: 18px; transition: 0.3s;
    }

    input {
      width: 100%; padding: 16px 16px 16px 52px;
      background: rgba(0, 230, 118, 0.03);
      border: 1px solid var(--border);
      border-radius: 16px; color: #fff; font-size: 15px;
      outline: none; transition: 0.3s;
    }

    input:focus {
      border-color: var(--admin-accent);
      background: rgba(0, 230, 118, 0.06);
      box-shadow: 0 0 22px rgba(0, 230, 118, 0.2);
    }

    input:focus + i { color: var(--admin-accent); }

    button {
      background: linear-gradient(135deg, #00e676, #00994d);
      color: #0a100a; border: none; width: 100%; padding: 18px;
      border-radius: 16px; font-weight: 800; font-size: 16px;
      cursor: pointer; transition: 0.3s; margin-top: 10px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      letter-spacing: -0.2px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px var(--admin-glow);
      filter: brightness(1.08);
    }

    button:active { transform: scale(0.98); }

    /* Custom Admin Toast — Green touched */
    .admin-toast {
        background: #0e1a12 !important;
        backdrop-filter: blur(15px) !important;
        border: 1px solid rgba(0, 230, 118, 0.5) !important;
        border-radius: 20px !important;
        color: #e0ffe6 !important;
        font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="admin-box">
    <div class="loader" id="ldBox"><div class="fill" id="ldBar"></div></div>
    
    <div class="brand-icon">
      <i class="fas fa-leaf"></i>
    </div>

    <h2>Admin Portal</h2>
    <p class="desc">Restricted access area — Green Tier</p>

    <form method="POST" id="adminForm" onsubmit="handleAdminLogin(event)">
      <div class="input-wrapper">
        <input name="username" placeholder="Admin Username" required>
        <i class="fas fa-user"></i>
      </div>
      
      <div class="input-wrapper">
        <input name="password" type="password" placeholder="Master Password" required>
        <i class="fas fa-key"></i>
      </div>
      
      <button type="submit" id="btnTxt">
        Authorize Access <i class="fas fa-unlock-alt"></i>
      </button>
    </form>
  </div>

  <script>
    async function handleAdminLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('btnTxt');
      const ldBox = document.getElementById('ldBox');
      const ldBar = document.getElementById('ldBar');
      
      // Collect credentials (demo purpose — identical functional structure)
      const username = document.querySelector('input[name="username"]').value.trim();
      const password = document.querySelector('input[name="password"]').value.trim();
      
      ldBox.style.display = 'block';
      btn.disabled = true;
      const originalText = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Verifying...';
      
      let w = 0;
      const progress = setInterval(() => {
          if(w < 90) { w += 15; ldBar.style.width = w + '%'; }
      }, 100);
      
      // Simulate backend validation with admin:green / master:emerald
      setTimeout(() => {
          clearInterval(progress);
          ldBar.style.width = '100%';
          
          if(username === "admin" && password === "green") {
              Swal.fire({
                  icon: 'success',
                  title: 'Access Granted',
                  text: 'Welcome to the Green Admin Zone.',
                  background: '#0e1a12',
                  color: '#ccffdd',
                  confirmButtonColor: '#00e676',
                  customClass: { popup: 'admin-toast' }
              }).then(() => {
                  // Redirect or just show success (original flow kept)
                  window.location.href = "/dashboard";   // forward to secure panel
              });
          } else {
              Swal.fire({
                  toast: true, position: 'top-end', showConfirmButton: false, timer: 3000,
                  icon: 'error', title: 'Invalid Admin Credentials',
                  text: 'Access denied: incorrect username or password.',
                  customClass: { popup: 'admin-toast' }
              });
              ldBox.style.display = 'none';
              btn.disabled = false;
              btn.innerHTML = originalText;
              ldBar.style.width = '0%';
          }
      }, 900);
    }
  </script>
</body>
</html>
