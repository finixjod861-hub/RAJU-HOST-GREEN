<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>RAJU HOST | Create Account</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

    :root { 
      --bg: #051007; 
      --card: rgba(10, 25, 12, 0.75); 
      --accent: #00cc66; 
      --accent-glow: #00e676;
      --border: rgba(80, 200, 120, 0.2); 
      --text-main: #f0fff0;
      --text-dim: #b0e0b0;
      --glass: blur(14px);
      --success-green: #00c853;
    }

    * { box-sizing: border-box; outline: none; }

    body { 
        margin: 0; 
        font-family: 'Plus Jakarta Sans', sans-serif; 
        background: var(--bg); 
        color: var(--text-main);
        background-image: 
            radial-gradient(circle at 0% 0%, rgba(0, 200, 100, 0.2) 0%, transparent 50%),
            radial-gradient(circle at 100% 100%, rgba(50, 230, 120, 0.2) 0%, transparent 50%),
            repeating-linear-gradient(45deg, rgba(30, 70, 30, 0.2) 0px, rgba(30, 70, 30, 0.2) 2px, transparent 2px, transparent 8px);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .signup-box {
        background: var(--card);
        backdrop-filter: var(--glass);
        padding: 30px;
        border-radius: 28px;
        border: 1px solid var(--border);
        width: 100%;
        max-width: 450px;
        box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 220, 100, 0.15);
        transition: all 0.2s ease;
    }

    .logo-area { text-align: center; margin-bottom: 25px; }
    .logo-icon { 
        background: linear-gradient(135deg, #00e676, #00994d); 
        width: 52px; height: 52px; 
        border-radius: 18px; 
        display: inline-flex; align-items: center; justify-content: center; 
        color: #ffffff;
        margin-bottom: 12px; 
        font-size: 26px;
        box-shadow: 0 8px 20px rgba(0, 200, 100, 0.3);
    }

    h2 { margin: 0; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(135deg, #e0ffe0, #a0f0a0); -webkit-background-clip: text; background-clip: text; color: transparent; }
    p { color: var(--text-dim); font-size: 13px; margin-top: 5px; font-weight: 500; letter-spacing: 0.3px; }

    .form-group { margin-bottom: 15px; text-align: left; }
    .form-group label { display: block; font-size: 11px; font-weight: 800; color: #b0ffb0; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    
    .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    input[type="text"], input[type="email"], input[type="password"] {
        width: 100%;
        padding: 12px 15px;
        background: rgba(20, 40, 22, 0.65);
        border: 1px solid rgba(80, 200, 100, 0.3);
        border-radius: 14px;
        color: #eaffea;
        font-size: 14px;
        transition: 0.25s;
        font-weight: 500;
    }

    input:focus { 
        border-color: var(--accent); 
        background: rgba(25, 55, 28, 0.8); 
        box-shadow: 0 0 0 3px rgba(0, 204, 102, 0.2);
    }

    .file-input-wrapper {
        position: relative;
        overflow: hidden;
        display: inline-block;
        width: 100%;
    }
    .file-btn {
        background: rgba(40, 70, 42, 0.55);
        border: 1px dashed rgba(80, 210, 110, 0.6);
        padding: 11px;
        border-radius: 14px;
        width: 100%;
        color: #ccffcc;
        font-size: 12px;
        cursor: pointer;
        text-align: center;
        transition: 0.2s;
        font-weight: 600;
    }
    .file-btn:hover {
        background: rgba(60, 100, 60, 0.7);
        border-color: #00e676;
    }

    .btn-signup {
        width: 100%;
        padding: 14px;
        background: linear-gradient(95deg, #00994d, #00cc66);
        color: white;
        border: none;
        border-radius: 40px;
        font-weight: 800;
        font-size: 15px;
        margin-top: 12px;
        cursor: pointer;
        transition: 0.25s;
        box-shadow: 0 8px 20px rgba(0, 180, 80, 0.4);
        letter-spacing: 1px;
    }
    .btn-signup:hover { 
        transform: translateY(-2px); 
        background: linear-gradient(95deg, #00aa55, #00e676);
        box-shadow: 0 15px 28px rgba(0, 200, 80, 0.5); 
    }

    .footer-text { text-align: center; margin-top: 22px; font-size: 13px; color: var(--text-dim); }
    .footer-text a { color: #00e676; text-decoration: none; font-weight: 800; border-bottom: 1px dotted #00cc66; }
    .footer-text a:hover { color: #aaffaa; }
  </style>
</head>
<body>

<div class="signup-box animate__animated animate__fadeInUp">
    <div class="logo-area">
        <div class="logo-icon"><i class="fas fa-leaf"></i></div>
        <h2>Create Account</h2>
        <p>Join RAJU HOST Ultra Pro Max</p>
    </div>

    <form id="signupForm" enctype="multipart/form-data">
        <div class="input-row">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" name="fname" placeholder="John" required>
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" name="lname" placeholder="Doe" required>
            </div>
        </div>

        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="johndoe123" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="name@example.com" required>
        </div>

        <div class="input-row">
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label>Confirm</label>
                <input type="password" name="confirm_password" placeholder="••••••••" required>
            </div>
        </div>

        <div class="form-group">
            <label>Profile Picture (Optional)</label>
            <div class="file-input-wrapper">
                <input type="file" name="pfp" id="pfp" style="display: none;" onchange="updateFileName(this)">
                <div class="file-btn" onclick="document.getElementById('pfp').click()" id="file-label">
                    <i class="fas fa-image"></i> Click to upload photo
                </div>
            </div>
        </div>

        <button type="submit" class="btn-signup">REGISTER NOW</button>
    </form>

    <div class="footer-text">
        Already have an account? <a href="/login">Login</a>
    </div>
</div>

<script>
function updateFileName(input) {
    const label = document.getElementById('file-label');
    if (input.files.length > 0) {
        label.innerHTML = `<i class="fas fa-check-circle" style="color:#00e676;"></i> ${input.files[0].name}`;
        label.style.borderColor = '#00cc66';
        label.style.color = '#eaffea';
        label.style.background = 'rgba(0,100,40,0.5)';
    } else {
        label.innerHTML = `<i class="fas fa-image"></i> Click to upload photo`;
        label.style.borderColor = 'rgba(80, 210, 110, 0.6)';
        label.style.background = 'rgba(40, 70, 42, 0.55)';
    }
}

document.getElementById('signupForm').onsubmit = async (e) => {
    e.preventDefault();
    
    const formData = new FormData(e.target);
    
    // UI Loading state
    const btn = e.target.querySelector('button');
    const originalText = btn.innerText;
    btn.innerText = "CREATING ACCOUNT...";
    btn.disabled = true;

    try {
        const response = await fetch('/signup', {
            method: 'POST',
            body: formData
        });
        
        const result = await response.json();
        
        if (result.status === 'success') {
            Swal.fire({
                title: 'Success!',
                text: 'Account created. Enjoy Our Hosting Server. ',
                icon: 'success',
                background: '#0a1f0e',
                color: '#e0ffe0',
                confirmButtonColor: '#00cc66',
                backdrop: `rgba(0,30,0,0.7)`
            }).then(() => {
                window.location.href = result.url;
            });
        } else {
            Swal.fire({
                title: 'Error',
                text: result.msg,
                icon: 'error',
                background: '#0a1f0e',
                color: '#ffd5d5',
                confirmButtonColor: '#00aa55'
            });
            btn.innerText = originalText;
            btn.disabled = false;
        }
    } catch (error) {
        console.error('Error:', error);
        Swal.fire({
            title: 'Network Issue',
            text: 'Could not connect to server. Try again later.',
            icon: 'warning',
            background: '#0a1f0e',
            color: '#ffe0b0'
        });
        btn.innerText = originalText;
        btn.disabled = false;
    }
};
</script>

</body>
</html>
